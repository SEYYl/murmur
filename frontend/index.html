<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Murmur — ASMR</title>
    <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css?v=22">
<script src="/static/config.js"></script>
<style>body{background:var(--bg,#0d0d0f);color:var(--text,#e8e8ed);margin:0}</style>

</head>
<body>

<a href="#main-content" class="skip-link">跳转到主要内容</a>

<header>
  <div class="header-inner">
    <button class="menu-toggle" id="menu-toggle" aria-label="菜单" aria-expanded="false"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    <button class="logo" onclick="navigate()" aria-label="返回首页">
      <svg class="logo-wave" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="2" y="7" width="2" height="6" rx="1" fill="currentColor"/>
        <rect x="6" y="4" width="2" height="12" rx="1" fill="currentColor"/>
        <rect x="10" y="2" width="2" height="16" rx="1" fill="currentColor"/>
        <rect x="14" y="5" width="2" height="10" rx="1" fill="currentColor"/>
      </svg>
      Murmur
    </button>
    <nav></nav>
  </div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="main" id="main-content" tabindex="-1">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-brand">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M16.5 11.2a6.5 6.5 0 0 1-8.4 6.2A5.5 5.5 0 1 0 11.2 4a6.5 6.5 0 0 0 5.3 7.2z" fill="var(--accent)"/></svg>
        Murmur
      </span>
      <button class="sidebar-close" id="sidebar-close" aria-label="关闭"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
    </div>
    <div class="sidebar-nav" id="sidebar-nav">
      <button class="sb-nav-item active" data-nav="home">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 8l6-5 6 5v7a1 1 0 0 1-1 1h-3v-4H7v4H4a1 1 0 0 1-1-1V8z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <span>首页</span>
      </button>
      <button class="sb-nav-item" data-nav="history">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 5v4l2.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>播放历史</span>
      </button>
      <button class="sb-nav-item" data-nav="favorites">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 15s-5.5-3.5-5.5-7.5A2.5 2.5 0 0 1 9 5a2.5 2.5 0 0 1 5.5 2.5C14.5 11.5 9 15 9 15z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <span>我的收藏</span>
      </button>
      <button class="sb-nav-item sb-nav-upload" data-nav="upload">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 12V4M9 4L5.5 7.5M9 4l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>上传内容</span>
      </button>
      <button class="sb-nav-item" data-nav="settings">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 2v1.5M9 14.5V16M2 9h1.5M14.5 9H16M3.8 3.8l1 1M13.2 13.2l1 1M3.8 14.2l1-1M13.2 4.8l1-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>设置</span>
      </button>
    </div>
    <div class="sidebar-section">
      <h3>分类</h3>
      <div class="cat-list" id="cat-list">
        <button class="cat-item active" data-cat=""><span class="cat-emoji"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 7h11M7 1.5c1.5 2 1.5 9 0 11M7 1.5c-1.5 2-1.5 9 0 11" stroke="currentColor" stroke-width="1.3"/></svg></span><span class="cat-name">全部</span></button>
      </div>
    </div>
    <div class="sidebar-foot" id="sidebar-foot"></div>
  </aside>
  <main id="content"><div class="loading"><div class="spinner"><span></span><span></span><span></span><span></span><span></span></div></div></main>
</div>

<script src="/static/js/i18n.js?v=2"></script>
<script src="/static/js/app.js?v=24"></script>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bn-item active" data-nav="home" aria-label="首页">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 10l8-6 8 6v8a1 1 0 0 1-1 1h-4v-5H8v5H4a1 1 0 0 1-1-1v-8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    <span>首页</span>
  </button>
  <button class="bn-item" data-nav="search" aria-label="搜索">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M14 14l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span>搜索</span>
  </button>
  <button class="bn-item bn-upload" data-nav="upload" aria-label="上传">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="12" fill="currentColor" opacity=".15"/><path d="M13 7v12M7 13h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <button class="bn-item" data-nav="favorites" aria-label="收藏">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 18s-7-4.5-7-9.5A3.5 3.5 0 0 1 11 5a3.5 3.5 0 0 1 7 3.5C18 13.5 11 18 11 18z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    <span>收藏</span>
  </button>
  <button class="bn-item" data-nav="profile" aria-label="我的">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 19c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span>我的</span>
  </button>
</nav>

<!-- Global Audio + Mini Player -->
<audio id="global-audio" preload="metadata"></audio>
<div class="mini-player" id="mini-player" hidden>
  <div class="mini-player-progress" id="mini-progress-track">
    <div class="mini-player-progress-fill" id="mini-progress-fill"></div>
  </div>
  <div class="mini-player-inner">
    <div class="mini-player-info" id="mini-player-info">
      <div class="mini-player-cover" id="mini-player-cover"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" opacity=".4"><path d="M3 10v4M7 7v10M11 9v6M15 7v10M19 10v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div class="mini-player-text">
        <div class="mini-player-title" id="mini-player-title">未播放</div>
        <div class="mini-player-meta" id="mini-player-meta">点击卡片播放</div>
      </div>
    </div>
    <div class="mini-player-controls">
      <button class="mini-btn" id="mini-prev" aria-label="上一首"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3 3v10M13 3L6 8l7 5V3z"/></svg></button>
      <button class="mini-btn mini-play-btn" id="mini-play" aria-label="播放/暂停"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3l12 7-12 7V3z"/></svg></button>
      <button class="mini-btn" id="mini-next" aria-label="下一首"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13 3v10M3 3l7 5-7 5V3z"/></svg></button>
    </div>
    <div class="mini-player-time" id="mini-time">0:00 / 0:00</div>
    <button class="mini-btn mini-expand" id="mini-expand" aria-label="展开"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4-4 4 4M4 10l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
</div>
</body>
</html>
